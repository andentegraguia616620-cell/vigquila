<!DOCTYPE html>
<html>

<head>

<title>FINAL EXPERIMENT</title>

<style>

body{

background:black;
color:#00ff00;
font-family:monospace;
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

}


#screen{

width:80%;
max-width:900px;
font-size:22px;
white-space:pre-line;

}


.left{

text-align:left;

}


.center{

text-align:center;

}


.red{

color:red;

}


/* 画面揺れ */

.shake{

animation:shake 0.15s;

}


@keyframes shake{

0%{
transform:translate(0,0);
}

25%{
transform:translate(8px,-3px);
}

50%{
transform:translate(-8px,3px);
}

75%{
transform:translate(5px,2px);
}

100%{
transform:translate(0,0);
}

}



/* glitch background */

.glitch-bg::before{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:

linear-gradient(
90deg,
transparent,
rgba(0,255,0,0.15),
transparent
);


animation:glitchMove 0.1s infinite;

pointer-events:none;

}



@keyframes glitchMove{


0%{

transform:translate(0);

}


25%{

transform:translate(-10px,3px);

}


50%{

transform:translate(8px,-2px);

}


75%{

transform:translate(-5px,5px);

}


100%{

transform:translate(0);

}


}




button{

background:black;

color:#00ff00;

border:1px solid #00ff00;

padding:10px;

font-family:monospace;

}



</style>

</head>


<body>


<div id="screen" class="left"></div>



<script>


const screen =
document.getElementById("screen");



function wait(ms){

return new Promise(resolve=>{

setTimeout(resolve,ms);

});

}




function clearScreen(){

screen.textContent="";

}



async function typeText(text,speed=35){

for(let i=0;i<text.length;i++){

screen.textContent += text[i];

await wait(speed);

}

}




function beep(){

let ctx=new AudioContext();

let osc=ctx.createOscillator();


osc.type="square";

osc.frequency.value=600;


osc.connect(ctx.destination);

osc.start();


setTimeout(()=>{

osc.stop();

},80);

}




let audioCtx;


function glitchSound(){

if(!audioCtx){

audioCtx = new AudioContext();

}


let count = 0;


let timer = setInterval(()=>{


let osc = audioCtx.createOscillator();


osc.type="square";


osc.frequency.value =
Math.random()*500+100;


osc.connect(audioCtx.destination);


osc.start();



setTimeout(()=>{

osc.stop();

},60);



count++;


if(count>=12){

clearInterval(timer);

}


},80);

}
  


let ctx=new AudioContext();


let osc=ctx.createOscillator();


osc.type="square";


osc.frequency.value=
Math.random()*300+80;


osc.connect(ctx.destination);


osc.start();



setTimeout(()=>{

osc.stop();

},50);



count++;


if(count>=8){

clearInterval(timer);

}


},120);


}




function shake(){

document.body.classList.add("shake");


setTimeout(()=>{

document.body.classList.remove("shake");

},150);


}



function backgroundGlitch(){

document.body.classList.add("glitch-bg");


setTimeout(()=>{

document.body.classList.remove("glitch-bg");

},500);


}




function blackout(){

return new Promise(resolve=>{


setTimeout(()=>{


clearScreen();


setTimeout(resolve,1000);


},2000);


});

}





async function start(){



// =================
// SCENE 1
// =================


await typeText(
"MS-DOS TERMINAL\n\n"
);



await typeText(
"C:\\EXPERIMENT\\FINAL>\n\n"
);



await typeText(
"Initializing system...\n\n"
);



await typeText(
"Memory check : OK\n"
);



await typeText(
"Security check : OK\n\n"
);



await typeText(
"C:\\EXPERIMENT\\FINAL> tree\n\n"
);



await typeText(
"EXPERIMENT\n"+
"│\n"+
"├── SYSTEM\n"+
"│   ├── core.exe\n"+
"│   └── security.dat\n"+
"│\n"+
"├── SUBJECT\n"+
"│   ├── subject001.dat\n"+
"│   ├── subject002.dat\n"+
"│   └── subject003.dat\n"+
"│\n"+
"└── hidden_data [LOCKED]\n\n"
);



await wait(1500);



await typeText(
"Downloading hidden_data...\n\n"
);



for(let i=10;i<=100;i+=10){


let bar="";


for(let j=0;j<i/10;j++){

bar+="█";

}


for(let j=0;j<10-i/10;j++){

bar+="-";

}



screen.textContent +=
"["+bar+"] "+i+"%\n";


beep();


await wait(400);


}



await typeText(
"\nDATA RESTORED"
);



await blackout();


// Part Bへ続く
  
// =================
// SCENE 2
// =================


screen.className="center";


shake();

backgroundGlitch();

glitchSound();


screen.innerHTML =
"<span class='red'>FINAL TEST COMPLETE</span>";



await wait(4000);



await blackout();





// =================
// SCENE 3
// =================


screen.className="center";


await typeText(
"YOU ARE QUALIFIED.\n\n"+
"BUT REMEMBER...\n\n"+
"YOU WERE NOT THE ONLY ONE BEING TESTED.\n\n"
);



await blackout();





// =================
// SCENE 4
// =================


screen.className="left";


await typeText(
"SUBJECT DATABASE\n\n"+
"SUBJECT 001 : PASSED\n\n"+
"SUBJECT 002 : UNKNOWN\n\n"+
"SUBJECT 003 : FAILED\n\n"+
"SUBJECT 004 : UNKNOWN\n\n"+
"SUBJECT 005 : LOCKED\n\n"
);




let detail =
document.createElement("button");


detail.textContent="DETAIL";



detail.onclick=function(){


screen.className="center";


screen.textContent =
"SUBJECT COUNT\n\n"+
"TOTAL : 5\n\n"+
"PASSED : 1\n\n"+
"UNKNOWN : 2\n\n"+
"FAILED : 1\n\n"+
"LOCKED : 1";


shake();

backgroundGlitch();

glitchSound();


};



screen.appendChild(detail);



await wait(8000);



await blackout();


// Part Cへ続く
  
// =================
// SCENE 5
// =================


screen.className="center";


screen.innerHTML =
"<span class='red'>ALL PREVIOUS DATA WILL BE PERMANENTLY DELETED.</span>";



await wait(2500);





// =================
// COUNTDOWN
// =================


for(let i=5;i>=1;i--){


screen.className="center";


screen.innerHTML =
"<div class='red' style='font-size:60px;'>"+
i+
"</div>";



beep();


await wait(1000);



clearScreen();


await wait(300);


}



shake();

backgroundGlitch();

glitchSound();






// =================
// SCENE 6
// =================


screen.className="center";


await typeText(
"CONNECTION TERMINATED.\n\n"+
"SYSTEM OFFLINE."
);



await wait(3000);




// 暗転


screen.style.transition="2s";

screen.style.opacity="0";



await wait(3000);



// 存在しないページへ移動

location.href="final_error.html";



}



// START

start();



</script>


</body>

</html>

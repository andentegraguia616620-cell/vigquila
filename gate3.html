<!DOCTYPE html>
<html>
<head>
<title>FINAL EXPERIMENT</title>

<style>

body{
background:#000;
color:#00ff00;
font-family:monospace;
height:100vh;
margin:0;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

#screen{
width:85%;
max-width:900px;
font-size:22px;
white-space:pre-line;
}

.center{
text-align:center;
}

.left{
text-align:left;
}

.red{
color:red;
}


.shake{
animation:shake .15s;
}


@keyframes shake{
0%{transform:translate(0);}
25%{transform:translate(8px,-3px);}
50%{transform:translate(-8px,3px);}
75%{transform:translate(5px,2px);}
100%{transform:translate(0);}
}


.static{
position:fixed;
inset:0;
background:
repeating-linear-gradient(
0deg,
rgba(255,255,255,.2) 0px,
transparent 2px,
transparent 4px
);
pointer-events:none;
}



button{
background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:10px;
font-family:monospace;
}


</style>
</head>


<body>

<div id="screen" class="center"></div>


<script>


const screen =
document.getElementById("screen");



function wait(ms){
return new Promise(r=>setTimeout(r,ms));
}



function clearScreen(){
screen.textContent="";
}



async function typeText(text,speed=35){

for(let c of text){

screen.textContent+=c;

await wait(speed);

}

}



async function terminalScroll(lines,max=10,speed=200){

let buffer=[];

for(let line of lines){

buffer.push(line);


if(buffer.length>max){
buffer.shift();
}


screen.textContent=
buffer.join("\n");


await wait(speed);

}

}


function beep(){

let ctx=new AudioContext();

let osc=ctx.createOscillator();

osc.type="square";

osc.frequency.value=600;

osc.connect(ctx.destination);

osc.start();

setTimeout(()=>osc.stop(),80);

}



function blackout(){

clearScreen();

return wait(1500);

}


// Part A-2へ続く
  // =====================
// PART A-2
// BOOT / TREE / DOWNLOAD
// =====================


async function start(){


// 起動ログ

screen.className="center";


await typeText(
"MS-DOS TERMINAL\n\n"
);


await typeText(
"C:\\EXPERIMENT\\FINAL>\n\n"
);


await typeText(
"Initializing system...\n\n"
);


await typeText(
"Memory check : OK\n\n"
);


await typeText(
"Security check : OK\n\n"
);


await blackout();




// =====================
// TREE
// =====================


screen.className="left";


await terminalScroll([


"C:\\EXPERIMENT\\FINAL> tree",

"",

"EXPERIMENT",

"│",

"├── SYSTEM",

"│   ├── core.exe",

"│   └── security.dat",

"│",

"├── SUBJECT",

"│   ├── subject001.dat",

"│   ├── subject002.dat",

"│   └── subject003.dat",

"│",

"├── ARCHIVE",

"│   └── old_data.bin",

"│",

"└── hidden_data [LOCKED]"


],10,250);



await wait(3000);



// 黒画面

await blackout();




// hidden_dataアクセス


screen.className="center";


await typeText(

"C:\\EXPERIMENT\\FINAL> access hidden_data\n\n"

);



await wait(1200);




await blackout();




// DOWNLOAD


screen.className="center";


await typeText(

"Downloading hidden_data...\n\n"

);



for(let i=10;i<=100;i+=10){


let bar="";


for(let j=0;j<i/10;j++){

bar+="█";

}


for(let j=0;j<10-i/10;j++){

bar+="-";

}



screen.textContent +=

"["+bar+"] "+i+"%\n";



beep();


await wait(400);


}



await wait(1000);



await typeText(

"\nDATA RESTORED"

);



await wait(2500);



await blackout();



// Part Bへ続く
  // =====================
// PART B
// FINAL TEST / SUBJECT
// =====================



function randomGlitch(){


if(Math.random() < 0.3){


let noise=document.createElement("div");


noise.className="static";


document.body.appendChild(noise);



document.body.classList.add("shake");



glitchBeep();



setTimeout(()=>{


noise.remove();

document.body.classList.remove("shake");


},500);



}


}



function glitchBeep(){


let ctx=new AudioContext();



for(let i=0;i<5;i++){


let osc=ctx.createOscillator();



osc.type="square";


osc.frequency.value=
Math.random()*700+100;



osc.connect(ctx.destination);


osc.start();



setTimeout(()=>{

osc.stop();

},80);



}


}




async function sceneB(){



// FINAL TEST


screen.className="center";


screen.innerHTML=
"<span class='red'>FINAL TEST COMPLETE</span>";



randomGlitch();


await wait(3000);




// QUALIFIED


await blackout();


screen.className="center";


await typeText(

"YOU ARE QUALIFIED.\n\n"+
"BUT REMEMBER...\n\n"+
"YOU WERE NOT THE ONLY ONE BEING TESTED."

);



randomGlitch();


await wait(3500);




// SUBJECT


await blackout();


screen.className="center";


await typeText(

"SUBJECT DATABASE\n\n"+
"SUBJECT 001 : PASSED\n\n"+
"SUBJECT 002 : UNKNOWN\n\n"+
"SUBJECT 003 : FAILED\n\n"+
"SUBJECT 004 : UNKNOWN\n\n"+
"SUBJECT 005 : LOCKED"

);



randomGlitch();



await wait(2000);



// DETAIL BUTTON


let btn=document.createElement("button");


btn.textContent="DETAIL";


btn.onclick=function(){


screen.className="center";


screen.textContent=

"SUBJECT COUNT\n\n"+
"TOTAL : 5\n\n"+
"PASSED : 1\n\n"+
"UNKNOWN : 2\n\n"+
"FAILED : 1\n\n"+
"LOCKED : 1";


randomGlitch();


};



screen.appendChild(btn);



await wait(8000);


// Part Cへ続く

}
  // =====================
// PART C
// DELETE / COUNTDOWN / END
// =====================


async function sceneC(){


// 削除警告


await blackout();


screen.className="center";


screen.innerHTML=
"<span class='red'>ALL PREVIOUS DATA WILL BE PERMANENTLY DELETED.</span>";



randomGlitch();



await wait(4000);




// カウントダウン


await blackout();



screen.className="center";


for(let i=5;i>=1;i--){


screen.innerHTML=
"<span class='red' style='font-size:80px;'>"
+i+
"</span>";


beep();


await wait(1000);


}



// 終了


await blackout();



screen.className="center";


await typeText(

"CONNECTION TERMINATED.\n\n"+
"SYSTEM OFFLINE."

);



await wait(3000);



// 最後の暗転


await blackout();



// 存在しないページへ移動


window.location.href="final_error.html";


}




// =====================
// START FLOW
// =====================


async function run(){


await start();


await sceneB();


await sceneC();


}


run();

<!DOCTYPE html>
<html>

<head>

<title>FINAL EXPERIMENT</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

#screen{

width:85%;
max-width:900px;
font-size:22px;
white-space:pre-line;

}


.center{
text-align:center;
}


.left{
text-align:left;
}


.red{
color:red;
}


.big{
font-size:80px;
}


.shake{

animation:shake 0.15s;

}


@keyframes shake{

0%{
transform:translate(0);
}

25%{
transform:translate(8px,-3px);
}

50%{
transform:translate(-8px,3px);
}

75%{
transform:translate(5px,2px);
}

100%{
transform:translate(0);
}

}



.static{

position:fixed;

inset:0;

background:

repeating-linear-gradient(
0deg,
rgba(255,255,255,.25),
transparent 2px,
transparent 4px
);

pointer-events:none;

}



button{

background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:10px;
font-family:monospace;

}


</style>

</head>


<body>


<div id="screen" class="center"></div>



<script>


const screen =
document.getElementById("screen");



function wait(ms){

return new Promise(resolve=>{

setTimeout(resolve,ms);

});

}



function clearScreen(){

screen.textContent="";

}



async function typeText(text,speed=35){

for(let i=0;i<text.length;i++){

screen.textContent += text[i];

await wait(speed);

}

}



async function scrollTree(lines,max=10,speed=200){

let buffer=[];


for(let line of lines){


buffer.push(line);


if(buffer.length>max){

buffer.shift();

}


screen.textContent=
buffer.join("\n");


await wait(speed);


}

}



function beep(){

let ctx=new AudioContext();

let osc=ctx.createOscillator();

osc.type="square";

osc.frequency.value=600;

osc.connect(ctx.destination);

osc.start();


setTimeout(()=>{

osc.stop();

},80);

}



function blackout(){

clearScreen();

return wait(1500);

}
// =====================
// PART A
// BOOT / TREE / DOWNLOAD
// =====================


async function partA(){


screen.className="center";



await typeText(
"MS-DOS TERMINAL\n\n"
);


await typeText(
"C:\\EXPERIMENT\\FINAL>\n\n"
);



await typeText(
"Initializing system...\n\n"
);



await typeText(
"Memory check : OK\n\n"
);



await typeText(
"Security check : OK\n\n"
);



await blackout();



// TREE

screen.className="left";



await scrollTree([


"C:\\EXPERIMENT\\FINAL> tree",

"",

"EXPERIMENT",

"│",

"├── SYSTEM",

"│   ├── core.exe",

"│   └── security.dat",

"│",

"├── SUBJECT",

"│   ├── subject001.dat",

"│   ├── subject002.dat",

"│   └── subject003.dat",

"│",

"├── ARCHIVE",

"│   └── old_data.bin",

"│",

"└── hidden_data [LOCKED]"


],10,250);



await wait(3000);



// ACCESS


await blackout();


screen.className="center";


await typeText(

"C:\\EXPERIMENT\\FINAL> access hidden_data\n\n"

);



await wait(1200);



await blackout();



// DOWNLOAD


await typeText(

"Downloading hidden_data...\n\n"

);



for(let i=10;i<=100;i+=10){


let bar="";


for(let j=0;j<i/10;j++){

bar+="█";

}


for(let j=0;j<10-i/10;j++){

bar+="-";

}



screen.textContent +=

"["+bar+"] "+i+"%\n";



beep();


await wait(400);


}



await wait(1000);



await typeText(

"\nDATA RESTORED"

);



await wait(2500);



await blackout();

}
// =====================
// PART B + C
// TEST / SUBJECT / END
// =====================


function glitch(){


if(Math.random()<0.73){


let noise=document.createElement("div");


noise.className="static";


document.body.appendChild(noise);


document.body.classList.add("shake");



let ctx=new AudioContext();


for(let i=0;i<6;i++){


let osc=ctx.createOscillator();


osc.type="square";

osc.frequency.value=
Math.random()*700+100;


osc.connect(ctx.destination);


osc.start();


setTimeout(()=>{

osc.stop();

},80);


}



setTimeout(()=>{


noise.remove();


document.body.classList.remove("shake");


},500);



}


}




async function partB(){



screen.className="center";



screen.innerHTML=
"<span class='red'>FINAL TEST COMPLETE</span>";



glitch();


await wait(3000);



await blackout();



await typeText(

"YOU ARE QUALIFIED.\n\n"+
"BUT REMEMBER...\n\n"+
"YOU WERE NOT THE ONLY ONE BEING TESTED."

);



glitch();


await wait(3000);



await blackout();



await typeText(

"SUBJECT DATABASE\n\n"+
"SUBJECT 001 : PASSED\n\n"+
"SUBJECT 002 : UNKNOWN\n\n"+
"SUBJECT 003 : FAILED\n\n"+
"SUBJECT 004 : UNKNOWN\n\n"+
"SUBJECT 005 : LOCKED"

);



glitch();


await wait(3000);



}



async function partC(){



await blackout();



screen.className="center";



screen.innerHTML=
"<span class='red'>ALL PREVIOUS DATA WILL BE PERMANENTLY DELETED.</span>";



glitch();


await wait(4000);



await blackout();



for(let i=5;i>=1;i--){


screen.innerHTML=

"<span class='red big'>"+i+"</span>";


beep();


await wait(1000);


}



await blackout();



await typeText(

"CONNECTION TERMINATED.\n\n"+
"SYSTEM OFFLINE."

);



await wait(3000);



await blackout();



window.location.href="final_error.html";


}



// =====================
// START
// =====================


async function run(){


await partA();


await partB();


await partC();


}


run();



</script>

</body>

</html>

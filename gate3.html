<!DOCTYPE html>
<html>

<head>

<title>Gate 3 Scene 1</title>

<style>

body{

background:black;
color:#00ff00;
font-family:monospace;
height:100vh;
margin:0;

display:flex;
align-items:center;
justify-content:center;

}

#screen{

width:80%;
font-size:22px;

}

</style>

</head>


<body>


<div id="screen"></div>



<script>


const screen =
document.getElementById("screen");



function wait(ms){

return new Promise(resolve=>{
setTimeout(resolve,ms);
});

}



async function typeText(text,speed=50){


for(let i=0;i<text.length;i++){


if(text[i]=="\n"){

screen.innerHTML += "<br>";

}

else{

screen.innerHTML += text[i];

}


await wait(speed);


}


}



async function start(){


await typeText(
"MS-DOS TERMINAL\n\n"
);


await typeText(
"C:\\EXPERIMENT\\FINAL>\n\n"
);


await typeText(
"Initializing system...\n"
);


await typeText(
"Memory check : OK\n"
);


await typeText(
"Security check : OK\n\n"
);


await typeText(
"Loading...\n\n"
);


await typeText(
"DATA RESTORED"
);



}



start();



</script>


</body>

</html>

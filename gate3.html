<!DOCTYPE html>
<html>

<head>

<title>FINAL EXPERIMENT</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}


#screen{
width:80%;
max-width:900px;
font-size:22px;
white-space:pre-line;
}


.red{
color:red;
}


.glitch{
animation:shake 0.15s;
}


@keyframes shake{

0%{
transform:translate(0,0);
}

25%{
transform:translate(8px,-3px);
}

50%{
transform:translate(-8px,3px);
}

75%{
transform:translate(5px,2px);
}

100%{
transform:translate(0,0);
}

}


button{

background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:10px;
font-family:monospace;

}

</style>

</head>


<body>


<div id="screen"></div>


<script>


const screen =
document.getElementById("screen");



function wait(ms){

return new Promise(resolve=>{

setTimeout(resolve,ms);

});

}



function clearScreen(){

screen.textContent="";

}



function beep(){

let ctx=new AudioContext();

let osc=ctx.createOscillator();

osc.frequency.value=600;

osc.connect(ctx.destination);

osc.start();


setTimeout(()=>{

osc.stop();

},120);

}



async function typeText(text,speed=35){

for(let i=0;i<text.length;i++){

screen.textContent += text[i];

await wait(speed);

}

}



async function blackout(){

await wait(2000);

clearScreen();

await wait(1000);

}



function glitch(){

document.body.classList.add("glitch");


setTimeout(()=>{

document.body.classList.remove("glitch");

},150);

}




async function start(){



// =================
// SCENE 1
// =================


await typeText(
"MS-DOS TERMINAL\n\n"
);


await typeText(
"C:\\EXPERIMENT\\FINAL>\n\n"
);


await typeText(
"Initializing system...\n\n"
);


await typeText(
"Memory check : OK\n"
);


await typeText(
"Security check : OK\n\n"
);


await typeText(
"C:\\EXPERIMENT\\FINAL> tree\n\n"
);


await typeText(
"EXPERIMENT\n"+
"│\n"+
"├── SYSTEM\n"+
"│   ├── core.exe\n"+
"│   └── security.dat\n"+
"│\n"+
"├── SUBJECT\n"+
"│   ├── subject001.dat\n"+
"│   ├── subject002.dat\n"+
"│   └── subject003.dat\n"+
"│\n"+
"└── hidden_data [LOCKED]\n\n"
);


await wait(1500);


await typeText(
"Downloading hidden_data...\n\n"
);


for(let i=10;i<=100;i+=10){


let bar="";


for(let j=0;j<i/10;j++){

bar+="█";

}


for(let j=0;j<(10-i/10);j++){

bar+="-";

}



screen.textContent +=
"["+bar+"] "+i+"%\n";


beep();


await wait(400);


}



await typeText(
"\nDATA RESTORED"
);


await blackout();


// Part Bはここから続く
  
// =================
// SCENE 2
// =================


glitch();


screen.innerHTML =
"<span class='red'>FINAL TEST COMPLETE</span>";


await wait(4000);


await blackout();




// =================
// SCENE 3
// =================


await typeText(
"YOU ARE QUALIFIED.\n\n"+
"BUT REMEMBER...\n\n"+
"YOU WERE NOT THE ONLY ONE BEING TESTED.\n\n"
);



await blackout();




// =================
// SCENE 4
// =================


await typeText(
"SUBJECT DATABASE\n\n"+
"SUBJECT 001 : PASSED\n\n"+
"SUBJECT 002 : UNKNOWN\n\n"+
"SUBJECT 003 : FAILED\n\n"+
"SUBJECT 004 : UNKNOWN\n\n"+
"SUBJECT 005 : LOCKED\n\n"
);



let detail =
document.createElement("button");


detail.textContent="DETAIL";



detail.onclick=function(){


screen.textContent =
"SUBJECT COUNT\n\n"+
"TOTAL : 5\n\n"+
"PASSED : 1\n\n"+
"UNKNOWN : 2\n\n"+
"FAILED : 1\n\n"+
"LOCKED : 1";


glitch();


};



screen.appendChild(detail);



await wait(8000);



await blackout();


// Part Cはここから続く
  
// =================
// SCENE 5
// =================


screen.innerHTML =
"<span class='red'>ALL PREVIOUS DATA WILL BE PERMANENTLY DELETED.</span>";



await wait(2000);




// COUNTDOWN


for(let i=5;i>=1;i--){


screen.innerHTML =
"<div style='text-align:center;font-size:100px;color:red;'>"+
i+
"</div>";


beep();


await wait(1000);


clearScreen();


await wait(300);


}



glitch();




// =================
// SCENE 6
// =================


await typeText(
"CONNECTION TERMINATED.\n\n"+
"SYSTEM OFFLINE."
);



await wait(3000);



screen.style.opacity="0";


await wait(3000);



// 存在しないページへ移動

location.href="final_error.html";



}


// START

start();



</script>


</body>

</html>

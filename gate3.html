<!DOCTYPE html>
<html>

<head>

<title>Final Gate</title>

<style>

body{

background:black;
color:#00ff00;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-size:20px;

}

#screen{

width:80%;
max-width:700px;

}

.red{

color:red;

}

.glitch{

animation:glitch 0.2s infinite;

}


@keyframes glitch{

0%{
transform:translate(2px,0);
}

50%{
transform:translate(-2px,0);
}

100%{
transform:translate(0,0);
}

}


#bar{

margin-top:20px;

}


</style>

</head>



<body>


<div id="screen">

</div>



<script>


let screen =
document.getElementById("screen");



function typeText(text,speed=40){


return new Promise(resolve=>{


let i=0;


let timer=setInterval(()=>{


screen.innerHTML += text[i];

i++;


if(i>=text.length){

clearInterval(timer);

resolve();

}


},speed);


});


}



function beep(){


let ctx=new AudioContext();

let osc=ctx.createOscillator();


osc.frequency.value=500;


osc.connect(ctx.destination);


osc.start();


setTimeout(()=>{

osc.stop();

},100);


}




async function start(){



await typeText(
"MS-DOS TERMINAL<br><br>"
);


await typeText(
"C:\\EXPERIMENT\\FINAL><br><br>"
);



await typeText(
"Initializing system...<br>"
);


await typeText(
"Memory check : OK<br>"
);


await typeText(
"Security check : OK<br><br>"
);



await typeText(
"Downloading hidden_data...<br><br>"
);



let bar="";


for(let i=0;i<=10;i++){


bar+="█";


screen.innerHTML +=
"["+
bar+
"----------".slice(i)+
"] "+
(i*10)+"%<br>";


beep();


await new Promise(r=>setTimeout(r,300));


}



await typeText(
"<br>DATA RESTORED.<br><br>"
);



await typeText(
"FILE FOUND : FINAL_MESSAGE.txt<br><br>"
);



screen.innerHTML +=
"<span class='red'>WARNING</span><br><br>";



await new Promise(r=>setTimeout(r,1000));



screen.innerHTML +=
"<div class='glitch'>";


await typeText(
"FINAL TEST COMPLETE<br><br>"
);



await typeText(
"YOU ARE QUALIFIED.<br><br>"
);



await typeText(
"BUT REMEMBER...<br><br>"
);



await typeText(
"YOU WERE NOT THE ONLY ONE BEING TESTED.<br><br>"
);



await typeText(
"SUBJECT 001 : PASSED<br>"
);



await typeText(
"SUBJECT 002 : UNKNOWN<br><br>"
);



await typeText(
"ALL PREVIOUS DATA WILL BE PERMANENTLY DELETED.<br><br>"
);



await typeText(
"CONNECTION TERMINATED.<br>"
);



await typeText(
"SYSTEM OFFLINE."
);



}



start();



</script>


</body>

</html>

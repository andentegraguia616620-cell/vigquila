<button onclick="playMorse()">MORSE SIGNAL</button>

<script>
function beep(time){
  let ctx = new AudioContext();
  let osc = ctx.createOscillator();
  osc.frequency.value = 700;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>{
    osc.stop();
  }, time);
}

function playMorse(){＋
  let code = [
    "...-","..","--.","--.-","..-","..",".-..",".-"
  ];

  let delay = 0;

  for(let letter of code){
    for(let c of letter){
      setTimeout(()=>{
        beep(c=="."?120:360);
      }, delay);
      delay += c=="."?250:500;
    }
    delay += 600;
  }
}
</script>
<div class="login">
  <p>ENTER PASSWORD</p>
  <input id="pass" type="password">
  <button onclick="check()">ACCESS</button>
  <p id="result"></p>
</div>

<script>
function check(){
  let password = document.getElementById("pass").value;

  if(password === "VIGQUILA"){
    document.getElementById("result").innerHTML =
    "ACCESS GRANTED<br>The gate has opened.";
  }else{
    document.getElementById("result").innerHTML =
    "ACCESS DENIED";
  }
}
</script>

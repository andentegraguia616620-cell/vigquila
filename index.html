<!DOCTYPE html>
<html>

<head>

<title>Experiment-000</title>

<style>

body{
background:#000;
color:#00ff00;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-size:24px;
}

.login{
text-align:center;
}

input,button{
background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:10px;
font-family:monospace;
}

button:hover{
background:#00ff00;
color:black;
}

</style>

</head>


<body>


<div class="login">


EXPERIMENT-000

<br><br>

ENTER PASSWORD

<br><br>


<input id="pass" type="password">


<button onclick="check()">
ACCESS
</button>


<p id="result"></p>


<br>


<button onclick="playMorse()">
MORSE SIGNAL
</button>


</div>



<script>


function check(){


let password =
document.getElementById("pass").value;



if(password === "VIGQUILA"){


location.href="gate2.html";


}else{


document.getElementById("result").innerHTML =
"ACCESS DENIED";


}


}



function beep(time){


let ctx = new AudioContext();

let osc = ctx.createOscillator();


osc.frequency.value = 700;


osc.connect(ctx.destination);


osc.start();


setTimeout(()=>{

osc.stop();

},time);


}



function playMorse(){


let code=[

"...-",
"..",
"--.",
"--.-",
"..-",
"..",
".-..",
".-"

];


let delay=0;



for(let letter of code){


for(let c of letter){


setTimeout(()=>{


beep(c=="."?120:360);


},delay);



delay += c=="."?250:500;


}


delay +=600;


}


}


</script>


</body>

</html>
